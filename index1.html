<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Кейс-казино</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #1a1e2b 0%, #0f121c 100%); font-family: 'Segoe UI', system-ui; padding: 20px; color: white; }
        .header { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .balance-card { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 60px; padding: 8px 20px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,215,0,0.3); }
        .balance-value { font-size: 24px; font-weight: bold; color: #FFD966; }
        .cases-grid { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .case-card { background: rgba(20,25,40,0.8); backdrop-filter: blur(8px); border-radius: 32px; padding: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.1s; }
        .case-card:active { transform: scale(0.98); }
        .case-info { display: flex; align-items: center; gap: 15px; }
        .case-icon { font-size: 48px; }
        .case-details h3 { font-size: 22px; margin-bottom: 5px; }
        .case-price { font-size: 15px; opacity: 0.8; }
        .open-button { background: linear-gradient(135deg, #FFB347, #FF8C00); border: none; color: white; font-weight: bold; padding: 12px 24px; border-radius: 40px; cursor: pointer; }
        .open-button:active { transform: scale(0.95); }
        .result-area { background: rgba(0,0,0,0.5); border-radius: 28px; padding: 20px; text-align: center; margin-top: 20px; }
        .ref-button { background: rgba(255,255,255,0.1); border-radius: 40px; padding: 8px 16px; display: inline-block; margin-top: 15px; cursor: pointer; }
        @media (max-width: 480px) {
            .case-icon { font-size: 38px; }
            .case-details h3 { font-size: 18px; }
            .open-button { padding: 10px 18px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="balance-card">
        <div class="star-icon">⭐</div>
        <div class="balance-value" id="balance">0</div>
        <div class="balance-label">звезд</div>
    </div>
</div>
<div class="cases-grid">
    <div class="case-card" data-cost="5" data-case="small">
        <div class="case-info"><div class="case-icon">📦</div><div class="case-details"><h3>Маленький кейс</h3><div class="case-price">⭐ 5 звезд</div></div></div>
        <button class="open-button">Открыть</button>
    </div>
    <div class="case-card" data-cost="20" data-case="medium">
        <div class="case-info"><div class="case-icon">🎁</div><div class="case-details"><h3>Средний кейс</h3><div class="case-price">⭐ 20 звезд</div></div></div>
        <button class="open-button">Открыть</button>
    </div>
    <div class="case-card" data-cost="50" data-case="big">
        <div class="case-info"><div class="case-icon">💎</div><div class="case-details"><h3>Большой кейс</h3><div class="case-price">⭐ 50 звезд</div></div></div>
        <button class="open-button">Открыть</button>
    </div>
</div>
<div class="result-area" id="result">Нажми на кейс, чтобы начать игру</div>
<div class="ref-button" id="refBtn">🔗 Реферальная ссылка (демо)</div>
<script>
    const STORAGE_KEY = 'casino_balance';
    const DEFAULT_BALANCE = 20;

    function getBalance() {
        let bal = localStorage.getItem(STORAGE_KEY);
        if (bal === null) {
            bal = DEFAULT_BALANCE;
            localStorage.setItem(STORAGE_KEY, bal);
        }
        return parseInt(bal);
    }
    function setBalance(bal) {
        localStorage.setItem(STORAGE_KEY, bal);
        document.getElementById('balance').innerText = bal;
    }
    function updateBalanceUI() {
        document.getElementById('balance').innerText = getBalance();
    }
    function openCase(cost, caseType) {
        let currentBal = getBalance();
        if (currentBal < cost) {
            document.getElementById('result').innerHTML = `❌ Не хватает звезд! Нужно ${cost} звезд.`;
            return;
        }
        currentBal -= cost;
        setBalance(currentBal);
        let win = 0;
        if (caseType === 'small') {
            let r = Math.random();
            if (r < 0.05) win = 15;
            else if (r < 0.15) win = 8;
            else if (r < 0.35) win = 3;
        } else if (caseType === 'medium') {
            let r = Math.random();
            if (r < 0.07) win = 50;
            else if (r < 0.2) win = 25;
            else if (r < 0.4) win = 10;
        } else {
            let r = Math.random();
            if (r < 0.1) win = 150;
            else if (r < 0.25) win = 70;
            else if (r < 0.5) win = 30;
        }
        if (win > 0) {
            currentBal += win;
            setBalance(currentBal);
            document.getElementById('result').innerHTML = `🎉 ПОБЕДА! Вы выиграли ${win} звезд! 🎉`;
        } else {
            document.getElementById('result').innerHTML = `😞 Увы, вы ничего не выиграли. Попробуйте еще.`;
        }
    }
    document.querySelectorAll('.case-card').forEach(card => {
        const btn = card.querySelector('.open-button');
        const cost = parseInt(card.dataset.cost);
        const caseType = card.dataset.case;
        btn.addEventListener('click', (e) => { e.stopPropagation(); openCase(cost, caseType); });
    });
    document.getElementById('refBtn').addEventListener('click', () => {
        alert("Реферальная система только в полной версии.\nВ демо просто играй.");
    });
    updateBalanceUI();
</script>
</body>
</html>
